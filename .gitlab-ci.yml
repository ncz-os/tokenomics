# tokenomics — unified LLM-spend ingestion engine. Python; builds on every push.
# Quality + import smoke on gitlab.com shared runners (fast/cheap); wheel artifact.
default:
  image: python:3.12-slim
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths: [.cache/pip]

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

stages: [check, build]

syntax+imports:
  stage: check
  script:
    - python -m compileall tokenomics_core tokenomics_cli.py hermes_plugin.py
    - python -c "import sys; sys.path.insert(0,'.'); import tokenomics_core, tokenomics_core.adapters.goose, tokenomics_core.adapters.hermes, tokenomics_cli, hermes_plugin; print('import smoke OK')"

lint:
  stage: check
  allow_failure: true   # advisory until the copied core is re-styled to ruff defaults
  script:
    - pip install ruff
    - ruff check tokenomics_core tokenomics_cli.py hermes_plugin.py

test:
  stage: check
  script:
    - pip install pytest
    - 'if compgen -G "tests/test_*.py" > /dev/null; then python -m pytest -q tests; else echo "no tests yet — skipping"; fi'

build-wheel:
  stage: build
  script:
    - pip install build
    - python -m build
  artifacts:
    name: "tokenomics-$CI_COMMIT_SHORT_SHA"
    paths: [dist/]
    expire_in: 30 days
